<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart | Cloud Peptides</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
<nav class="nav">
<a class="logo" href="index.html">
<img src="assets/logo.png" alt="Cloud Peptides">
</a>

<button class="menu" id="menuBtn">☰</button>

<div class="nav-links" id="navLinks">
<a href="index.html">Home</a>
<a href="shop.html">Shop</a>
<a href="faq.html">FAQ</a>
<a href="about.html">About</a>
<a href="https://discord.gg/8pF3AvHgT" target="_blank">Discord</a>
<a href="contact.html">Contact</a>
</div>

<a href="cart.html" class="cart-icon">🛍️</a>
</nav>
</header>

<main>

<section class="container">

<h1>Your Cart</h1>

<div id="cartItems"></div>

<h2 style="margin-top:40px;">Checkout</h2>

<input id="customerName" placeholder="Name">

<input id="customerEmail" placeholder="Email">

<input id="customerContact" placeholder="Phone / Discord">

<button id="submitOrder" class="btn">
Place Order Request
</button>

</section>

</main>

<footer class="footer">
<strong>♡ For research purposes only. Not for human consumption. ♡</strong><br>
© 2026 Cloud Peptides. All rights reserved.
</footer>

<script src="js/cart.js"></script>

<script>

const cart =
JSON.parse(localStorage.getItem('cart') || '[]');

const container =
document.getElementById('cartItems');

container.innerHTML = cart.map(item => `
<div class="panel" style="margin-bottom:20px;">
<h3>${item.product}</h3>
<p>${item.mg}</p>
<p>${item.price}</p>
</div>
`).join('');

document
.getElementById('submitOrder')
.addEventListener('click', async () => {

const name =
document.getElementById('customerName').value;

const email =
document.getElementById('customerEmail').value;

const contact =
document.getElementById('customerContact').value;

const total =
cart.reduce((sum,item)=>{

const price =
Number(item.price.replace(/[^0-9.]/g,''));

return sum + price;

},0);

await fetch(
'https://script.google.com/macros/s/AKfycbxLEpm1l_PB6IRwCGFJzqFmXy8Mqx36_yYXxcEiwoHWWDQIuBsBiAK3VJ6C3sz1bt2U/exec',
{
method:'POST',
body:JSON.stringify({
name,
email,
contact,
products:JSON.stringify(cart),
total
})
}
);

alert(
'Order submitted successfully. We will contact you shortly.'
);

localStorage.removeItem('cart');

window.location.href='index.html';

});

</script>

<script src="js/app.js"></script>

</body>
</html>
